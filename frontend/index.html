<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AlgoScope — Algorithm Race Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void: #050F09;
    --bg-panel: #081C0F;
    --bg-panel-raised: #0C2614;
    --line-hair: #1B4A2A;
    --ink-primary: #B9FFCB;
    --ink-dim: #5FA872;
    --ink-faint: #2C5A3A;

    /* two physical phosphors — this is the whole bit: channel A runs on a
       green tube, channel B on an amber one, like two scopes wired together */
    --lane-a: #39FF14;
    --lane-a-dim: #123D0F;
    --lane-b: #FFB000;
    --lane-b-dim: #4A3300;

    --alert: #FF3B30;
    --gold: #FFF07A;

    --mono-display: 'VT323', ui-monospace, monospace;
    --mono-body: 'Share Tech Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.65) 100%),
      var(--bg-void);
    color: var(--ink-primary);
    font-family: var(--mono-body);
    text-transform: uppercase;
  }
  button, select, input{ font-family: inherit; }
  :focus-visible{ outline: 2px solid var(--lane-a); outline-offset: 2px; }


  .crt-layer{
    position: fixed; inset: 0; pointer-events: none; z-index: 50;
  }
  .crt-layer::before{
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.22) 0px,
      rgba(0,0,0,0.22) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: multiply;
  }
  .crt-sweep{
    position: absolute; left:0; right:0; height: 120px;
    background: linear-gradient(to bottom, transparent, rgba(185,255,203,0.05), transparent);
    animation: sweep 7s linear infinite;
  }
  @keyframes sweep{ 0%{ top:-120px; } 100%{ top:100%; } }
  body{ animation: flicker 6s infinite; }
  @keyframes flicker{
    0%, 96%, 100% { opacity: 1; }
    97% { opacity: 0.985; }
    98% { opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce){
    .crt-sweep{ display:none; }
    body{ animation: none; }
  }

  .app{
    max-width: 1280px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .topbar{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding: 18px 22px 8px;
    border-bottom: 1px solid var(--line-hair);
  }
  .brand{ display:flex; flex-direction:column; gap:2px; }
  .brand-mark{
    font-family: var(--mono-display);
    font-size: 2.4rem;
    line-height: 1;
    letter-spacing: 0.04em;
    color: var(--ink-primary);
    text-shadow: 0 0 6px rgba(185,255,203,0.55), 0 0 14px rgba(57,255,20,0.25);
  }
  .brand-mark::after{
    content: "▌";
    margin-left: 4px;
    animation: caret 1.1s steps(1) infinite;
    color: var(--lane-a);
  }
  @keyframes caret{ 0%,49%{ opacity:1; } 50%,100%{ opacity:0; } }
  @media (prefers-reduced-motion: reduce){ .brand-mark::after{ animation:none; } }
  .brand-sub{
    font-family: var(--mono-body);
    font-size: 0.7rem;
    color: var(--ink-dim);
    letter-spacing: 0.08em;
  }
  .conn-status{
    display:flex; align-items:center; gap:8px;
    font-family: var(--mono-body); font-size: 0.72rem; color: var(--ink-dim);
    border: 1px solid var(--line-hair); padding: 4px 10px;
  }
  .conn-status::before{ content: "LINK "; color: var(--ink-faint); }
  .dot{ width:7px; height:7px; border-radius:50%; background: var(--ink-faint); }
  .dot.connecting{ background: var(--gold); animation: pulse 1s infinite ease-in-out; }
  .dot.live{ background: var(--lane-a); box-shadow: 0 0 8px var(--lane-a); }
  .dot.error{ background: var(--alert); box-shadow: 0 0 8px var(--alert); }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
  @media (prefers-reduced-motion: reduce){ .dot.connecting{ animation:none; } }

  .track{
    flex:1;
    display:grid;
    grid-template-columns: 1fr 46px 1fr;
    gap: 14px;
    padding: 18px 22px;
    min-height: 0;
  }
  @media (max-width: 760px){
    .track{ grid-template-columns: 1fr; grid-template-rows: auto 40px auto; }
    .telemetry{ flex-direction: row !important; }
    .telemetry-track{ width: auto !important; height: 12px !important; flex:1; }
  }

  .lane{
    background: var(--bg-panel);
    border: 1px solid var(--line-hair);
    display:flex;
    flex-direction: column;
    overflow:hidden;
    min-height: 340px;
    position: relative;
  }
  .lane::before, .lane::after{
    content: "+"; position:absolute; color: var(--line-hair);
    font-family: var(--mono-display); font-size: 1.1rem; line-height:1;
  }
  .lane::before{ top:-2px; left:2px; }
  .lane::after{ bottom:-6px; right:2px; }
  .lane-a{ --lane-color: var(--lane-a); }
  .lane-b{ --lane-color: var(--lane-b); }

  .lane-head{
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line-hair);
  }
  .lane-tag{
    font-family: var(--mono-body); font-weight:700; font-size:0.68rem;
    letter-spacing: 0.1em; color: var(--lane-color);
  }
  .lane-algo{
    font-family: var(--mono-display); font-size:1.3rem; line-height:1;
    color: var(--ink-primary);
    text-shadow: 0 0 6px currentColor;
  }

  .lane-canvas{ display:block; width:100%; flex:1; background: var(--bg-panel-raised); }

  .lane-stats{
    display:flex; gap:18px; padding: 8px 14px;
    border-top: 1px solid var(--line-hair);
    font-family: var(--mono-body); font-size: 0.7rem; color: var(--ink-dim);
  }
  .lane-stats b{ color: var(--ink-primary); font-weight:400; }

  /* telemetry divider (dual VU meter)*/
  .telemetry{
    display:flex; flex-direction: column; align-items:center; justify-content:center; gap:10px;
  }
  .telemetry-track{
    position:relative;
    width: 16px; height: 100%;
    background: var(--bg-panel-raised);
    border: 1px solid var(--line-hair);
    overflow:hidden;
    display:flex;
  }
  .telemetry-fill{
    position:absolute; bottom:0; width:50%; height:0%;
    transition: height .15s linear;
    background-image: repeating-linear-gradient(
      to bottom, rgba(0,0,0,0.55) 0px, rgba(0,0,0,0.55) 2px, transparent 2px, transparent 6px
    );
  }
  .telemetry-fill-a{ left:0; background-color: var(--lane-a); }
  .telemetry-fill-b{ right:0; background-color: var(--lane-b); }
  @media (prefers-reduced-motion: reduce){ .telemetry-fill{ transition:none; } }
  .telemetry-leader{
    font-family: var(--mono-body); font-size: 0.66rem; color: var(--ink-dim); white-space:nowrap;
  }

  /* conrtols*/
  .dock{
    background: var(--bg-panel);
    border-top: 1px solid var(--line-hair);
    padding: 14px 22px;
    display:flex; flex-wrap:wrap; gap: 16px 24px;
    align-items:flex-end;
  }
  .dock-group{ display:flex; flex-direction:column; gap:6px; }
  .dock-label{
    font-family: var(--mono-body); font-size: 0.64rem; letter-spacing:0.08em;
    color: var(--ink-dim);
  }
  .dock-label::before{ content: "> "; color: var(--ink-faint); }
  .dock-row{ display:flex; align-items:center; gap:8px; }

  .seg{
    display:inline-flex; background: var(--bg-panel-raised);
    border: 1px solid var(--line-hair); overflow:hidden;
  }
  .seg button{
    padding: 6px 14px; font-family: var(--mono-body); font-size:0.7rem; font-weight:700;
    letter-spacing:0.06em; color: var(--ink-dim); background: transparent; border:none; cursor:pointer;
    text-transform: uppercase;
  }
  .seg button.active{ background: var(--ink-primary); color: var(--bg-void); }

  select, input[type="number"]{
    background: var(--bg-panel-raised);
    border: 1px solid var(--line-hair);
    color: var(--ink-primary);
    padding: 6px 10px;
    font-size: 0.76rem;
    min-width: 0;
    text-transform: uppercase;
  }
  input[type="number"]{ width: 64px; }

  input[type="range"]{
    -webkit-appearance:none; appearance:none;
    width: 130px; height: 3px; background: var(--line-hair); outline-offset: 4px;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none; width:12px; height:12px; border-radius:0;
    background: var(--gold); cursor:pointer; box-shadow: 0 0 6px var(--gold);
  }
  input[type="range"]::-moz-range-thumb{
    width:12px; height:12px; border-radius:0; background: var(--gold); border:none; cursor:pointer;
    box-shadow: 0 0 6px var(--gold);
  }

  .readout{ font-family: var(--mono-body); font-size: 0.72rem; color: var(--ink-primary); min-width: 50px; }

  button.icon-btn{
    width: 32px; height: 32px; border-radius: 0;
    background: var(--bg-panel-raised); border: 1px solid var(--line-hair);
    color: var(--ink-primary); font-size: 0.8rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  button.icon-btn:hover{ border-color: var(--ink-dim); }

  button.primary{
    background: var(--lane-a); color: var(--bg-void);
    font-family: var(--mono-body); font-weight:700; font-size:0.76rem; letter-spacing:0.08em;
    text-transform: uppercase; padding: 9px 20px; border: none; border-radius: 0; cursor:pointer;
    margin-left: auto;
    box-shadow: 0 0 10px rgba(57,255,20,0.45);
  }
  button.primary:hover{ filter: brightness(1.08); }
  button.primary:disabled{ opacity:0.4; cursor:not-allowed; filter:none; box-shadow:none; }

  .hidden{ display:none !important; }
</style>
</head>
<body>
<div class="crt-layer"><div class="crt-sweep"></div></div>
<div class="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">ALGOSCOPE</span>
      <span class="brand-sub">// two functions racing on one input, no head start</span>
    </div>
    <div class="conn-status">
      <span class="dot" id="connDot"></span>
      <span id="connLabel">disconnected</span>
    </div>
  </header>

  <main class="track">
    <section class="lane lane-a" id="laneA">
      <div class="lane-head">
        <span class="lane-tag">CH.A — GRN</span>
        <span class="lane-algo" id="algoNameA">—</span>
      </div>
      <canvas class="lane-canvas" id="canvasA"></canvas>
      <div class="lane-stats" id="statsA">
        <span>frame <b>0</b></span>
      </div>
    </section>

    <div class="telemetry" id="telemetry">
      <div class="telemetry-track">
        <div class="telemetry-fill telemetry-fill-a" id="fillA"></div>
        <div class="telemetry-fill telemetry-fill-b" id="fillB"></div>
      </div>
      <div class="telemetry-leader" id="leaderMark">—</div>
    </div>

    <section class="lane lane-b" id="laneB">
      <div class="lane-head">
        <span class="lane-tag">CH.B — AMB</span>
        <span class="lane-algo" id="algoNameB">—</span>
      </div>
      <canvas class="lane-canvas" id="canvasB"></canvas>
      <div class="lane-stats" id="statsB">
        <span>frame <b>0</b></span>
      </div>
    </section>
  </main>

  <footer class="dock">
    <div class="dock-group">
      <span class="dock-label">Mode</span>
      <div class="seg" id="modeSeg">
        <button type="button" data-mode="sort" class="active">Sort</button>
        <button type="button" data-mode="path">Path</button>
      </div>
    </div>

    <div class="dock-group">
      <span class="dock-label">Ch.A</span>
      <select id="selA"></select>
    </div>

    <div class="dock-group">
      <span class="dock-label">Ch.B</span>
      <select id="selB"></select>
    </div>

    <div class="dock-group">
      <span class="dock-label" id="sizeLabel">Array size</span>
      <div class="dock-row">
        <input type="range" id="sizeSlider" min="5" max="40" value="14">
        <span class="readout" id="sizeReadout">14</span>
      </div>
    </div>

    <div class="dock-group hidden" id="wallsGroup">
      <span class="dock-label">Wall density</span>
      <div class="dock-row">
        <input type="range" id="wallsSlider" min="0" max="40" value="20">
        <span class="readout" id="wallsReadout">20%</span>
      </div>
    </div>

    <div class="dock-group">
      <span class="dock-label">Playback speed</span>
      <div class="dock-row">
        <input type="range" id="speedSlider" min="1" max="30" value="10">
        <span class="readout" id="speedReadout">10 fps</span>
      </div>
    </div>

    <div class="dock-group">
      <span class="dock-label">Transport</span>
      <div class="dock-row">
        <button type="button" class="icon-btn" id="playPauseBtn" aria-label="Play">▶</button>
      </div>
    </div>

    <button type="button" class="primary" id="startBtn">[ Start Race ]</button>
  </footer>

</div>

<script src="renderer.js"></script>
<script src="controls.js"></script>
</body>
</html>
